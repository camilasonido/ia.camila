<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Web de Camila</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #ff69b4; /* Rosa */
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
        }
        form {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Página Web de Camila</h1>
    
    <p style="text-align: center; font-size: 1.2em; color: #666; margin-bottom: 20px;">Esta página web es para guardar información como en un diario de vida</p>
    
    <h2 style="text-align: center; color: #333; margin-bottom: 20px;">Crea tu usuario</h2>
    
    <form id="registerForm" action="#" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>
        
        <label for="rut">RUT:</label>
        <input type="text" id="rut" name="rut" required>
        
        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" required>
        
        <label for="correo">Correo:</label>
        <input type="email" id="correo" name="correo" required>
        
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>
        
        <label for="direccion">Dirección:</label>
        <input type="text" id="direccion" name="direccion" required>
        
        <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
        
        <label for="opcion">Elige tu versión:</label>
        <select id="opcion" name="opcion" required>
            <option value="">Selecciona una versión</option>
            <option value="profesional">Profesional</option>
            <option value="principiante">Principiante</option>
            <option value="invitado">Invitado</option>
        </select>
        
        <button type="submit">Enviar</button>
    </form>
    
    <h2 style="text-align: center; color: #333; margin-top: 40px;">Iniciar Sesión</h2>
    <form id="loginForm" style="max-width: 400px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
        <label for="loginRut">RUT:</label>
        <input type="text" id="loginRut" name="loginRut" required>
        
        <label for="loginPassword">Contraseña:</label>
        <input type="password" id="loginPassword" name="loginPassword" required>
        
        <button type="submit">Iniciar Sesión</button>
    </form>

    <script>
        function obtenerUsuarios() {
            const usuariosGuardados = JSON.parse(localStorage.getItem('usuarios')) || [];
            if (usuariosGuardados.length > 0) {
                return usuariosGuardados;
            }

            const usuarioAntiguo = JSON.parse(localStorage.getItem('datosUsuario'));
            return usuarioAntiguo ? [usuarioAntiguo] : [];
        }

        function guardarUsuarios(usuarios) {
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
        }

        function guardarUsuarioActivo(usuario) {
            localStorage.setItem('usuarioActivo', JSON.stringify(usuario));
            localStorage.setItem('datosUsuario', JSON.stringify(usuario));
        }

        function obtenerUsuarioActivo() {
            const usuarioActivo = JSON.parse(localStorage.getItem('usuarioActivo'));
            if (usuarioActivo) {
                return usuarioActivo;
            }
            return JSON.parse(localStorage.getItem('datosUsuario'));
        }

        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const rut = document.getElementById('rut').value;
            const telefono = document.getElementById('telefono').value;
            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;
            const direccion = document.getElementById('direccion').value;
            const fechaNacimiento = document.getElementById('fecha_nacimiento').value;
            const opcion = document.getElementById('opcion').value;

            const usuario = {
                nombre: nombre,
                rut: rut,
                telefono: telefono,
                correo: correo,
                password: password,
                direccion: direccion,
                fechaNacimiento: fechaNacimiento,
                opcion: opcion
            };

            const usuarios = obtenerUsuarios();
            const existe = usuarios.some(u => u.rut === rut);
            if (existe) {
                alert('Este RUT ya está registrado. Usa otro o inicia sesión.');
                return;
            }

            usuarios.push(usuario);
            guardarUsuarios(usuarios);
            guardarUsuarioActivo(usuario);

            alert('Usuario creado exitosamente. Redirigiendo al menú...');
            document.getElementById('registerForm').reset();
            window.location.href = 'menu.html';
        });

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const loginRut = document.getElementById('loginRut').value;
            const loginPassword = document.getElementById('loginPassword').value;
            const usuarios = obtenerUsuarios();
            const usuario = usuarios.find(u => u.rut === loginRut && u.password === loginPassword);

            if (usuario) {
                guardarUsuarioActivo(usuario);
                alert('Inicio de sesión exitoso. Redirigiendo al menú...');
                window.location.href = 'menu.html';
            } else {
                alert('RUT o contraseña incorrectos.');
            }
        });
    </script>
</body>
</html>
