<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de Videos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ff69b4;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
        }
        .video-container {
            max-width: 800px;
            margin: 0 auto 20px;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        iframe {
            width: 100%;
            height: 360px;
            border: none;
            border-radius: 8px;
        }
        .back-button {
            display: block;
            margin: 0 auto;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        .back-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Visualización de Videos</h1>
    <p class="subtitle">Mira videos en línea desde aquí</p>
    <div class="video-container">
        <h2>Video 1</h2>
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>
    <div class="video-container">
        <h2>Video 2</h2>
        <iframe src="https://www.youtube.com/embed/5qap5aO4i9A" allowfullscreen></iframe>
    </div>
    <button class="back-button" onclick="window.location.href='menu.html'">Volver al Menú</button>
</body>
</html>
