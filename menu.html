<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Camila</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ff69b4;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
        }
        .menu {
            max-width: 500px;
            margin: 0 auto;
            display: grid;
            gap: 15px;
        }
        .menu button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            background-color: #4CAF50;
        }
        .menu button:hover {
            background-color: #45a049;
        }
        .logout {
            background-color: #e74c3c;
        }
        .logout:hover {
            background-color: #c0392b;
        }
        .user-info {
            max-width: 500px;
            margin: 0 auto 20px;
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Menú de Camila</h1>
    <p class="subtitle">Elige una opción para continuar</p>
    <div class="user-info" id="userInfo"></div>
    <div class="menu">
        <button id="btnDiario">Ir al Diario</button>
        <button id="btnCarrito">Carrito de Compra</button>
        <button id="btnVideos">Visualización de Videos en Línea</button>
        <button id="btnLogout" class="logout">Cerrar Sesión</button>
    </div>

    <script>
        const usuarioActivo = JSON.parse(localStorage.getItem('usuarioActivo'));
        if (!usuarioActivo) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('userInfo').innerHTML = `
                <p><strong>Bienvenido:</strong> ${usuarioActivo.nombre}</p>
                <p><strong>RUT:</strong> ${usuarioActivo.rut}</p>
                <p><strong>Versión:</strong> ${usuarioActivo.opcion}</p>
            `;
        }

        document.getElementById('btnDiario').addEventListener('click', function() {
            window.location.href = 'diario.html';
        });
        document.getElementById('btnCarrito').addEventListener('click', function() {
            window.location.href = 'carrito.html';
        });
        document.getElementById('btnVideos').addEventListener('click', function() {
            window.location.href = 'videos.html';
        });
        document.getElementById('btnLogout').addEventListener('click', function() {
            localStorage.removeItem('usuarioActivo');
            localStorage.removeItem('datosUsuario');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
